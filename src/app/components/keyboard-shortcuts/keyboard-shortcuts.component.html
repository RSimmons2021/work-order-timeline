<div class="shortcuts-overlay" (click)="onBackdropClick($event)">
  <div class="shortcuts-panel" role="dialog" aria-label="Keyboard shortcuts">
    <div class="shortcuts-header">
      <h2 class="shortcuts-title">Keyboard Shortcuts</h2>
      <button class="close-btn" (click)="onClose()" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4 4L12 12M12 4L4 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="shortcuts-body">
      @for (group of shortcutGroups; track group.title) {
        <div class="shortcut-group">
          <h3 class="group-title">{{ group.title }}</h3>
          @for (shortcut of group.shortcuts; track shortcut.description) {
            <div class="shortcut-row">
              <div class="shortcut-keys">
                @for (key of shortcut.keys; track key; let last = $last) {
                  <kbd>{{ key }}</kbd>
                  @if (!last) {
                    <span class="key-separator">+</span>
                  }
                }
              </div>
              <span class="shortcut-desc">{{ shortcut.description }}</span>
            </div>
          }
        </div>
      }
    </div>
  </div>
</div>
